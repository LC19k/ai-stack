services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: ai-stack-openwebui
    restart: unless-stopped
    networks:
      backend:
      frontend:
        ipv4_address: ${AI_STACK_OPENWEBUI_FRONTEND_IP}
        mac_address: ${AI_STACK_OPENWEBUI_FRONTEND_MAC}
    ports:
      - "${AI_STACK_OPENWEBUI_PORT}:8080"
    volumes:
      - /mnt/user/appdata/ai-stack/openwebui:/app/backend/data
      - /mnt/user/appdata/ai-stack/openwebui-models:/app/models

  lmstudio:
    image: lmstudio/server:latest
    container_name: ai-stack-lmstudio
    restart: unless-stopped
    networks:
      backend:
      frontend:
        ipv4_address: ${AI_STACK_LMSTUDIO_FRONTEND_IP}
        mac_address: ${AI_STACK_LMSTUDIO_FRONTEND_MAC}
    ports:
      - "${AI_STACK_LMSTUDIO_PORT}:1234"
    volumes:
      - /mnt/user/appdata/ai-stack/lmstudio/models:/models
      - /mnt/user/appdata/ai-stack/lmstudio/config:/config

  localai:
    image: quay.io/go-skynet/local-ai:latest
    container_name: ai-stack-localai
    restart: unless-stopped
    networks:
      backend:
    ports:
      - "${AI_STACK_LOCALAI_PORT}:8080"
    volumes:
      - /mnt/user/appdata/ai-stack/localai/models:/models
      - /mnt/user/appdata/ai-stack/localai/config:/config

  flowise:
    image: flowiseai/flowise:latest
    container_name: ai-stack-flowise
    restart: unless-stopped
    networks:
      backend:
      frontend:
        ipv4_address: ${AI_STACK_FLOWISE_FRONTEND_IP}
        mac_address: ${AI_STACK_FLOWISE_FRONTEND_MAC}
    ports:
      - "${AI_STACK_FLOWISE_PORT}:3000"
    volumes:
      - /mnt/user/appdata/ai-stack/flowise:/root/.flowise

  n8n:
    image: n8nio/n8n:latest
    container_name: ai-stack-n8n
    restart: unless-stopped
    networks:
      backend:
      frontend:
        ipv4_address: ${AI_STACK_N8N_FRONTEND_IP}
        mac_address: ${AI_STACK_N8N_FRONTEND_MAC}
    ports:
      - "${AI_STACK_N8N_PORT}:5678"
    environment:
      DB_TYPE: postgres
      DB_POSTGRESDB_HOST: postgres-main
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${AI_STACK_N8N_DB_PASSWORD}
      QUEUE_BULL_REDIS_HOST: redis-main
      QUEUE_BULL_REDIS_PORT: 6379
      N8N_ENCRYPTION_KEY: ${AI_STACK_N8N_ENCRYPTION_KEY}
    volumes:
      - /mnt/user/appdata/ai-stack/n8n:/home/node/.n8n

  langfuse:
    image: langfuse/langfuse:latest
    container_name: ai-stack-langfuse
    restart: unless-stopped
    networks:
      backend:
      frontend:
        ipv4_address: ${AI_STACK_LANGFUSE_FRONTEND_IP}
        mac_address: ${AI_STACK_LANGFUSE_FRONTEND_MAC}
    ports:
      - "${AI_STACK_LANGFUSE_PORT}:3000"
    environment:
      DATABASE_URL: postgres://langfuse:${AI_STACK_LANGFUSE_DB_PASSWORD}@postgres-main:5432/langfuse
      NEXTAUTH_SECRET: ${AI_STACK_LANGFUSE_NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://your-langfuse-domain/
    volumes:
      - /mnt/user/appdata/ai-stack/langfuse:/data

  neo4j:
    image: neo4j:5
    container_name: ai-stack-neo4j
    restart: unless-stopped
    networks:
      backend:
      frontend:
        ipv4_address: ${AI_STACK_NEO4J_FRONTEND_IP}
        mac_address: ${AI_STACK_NEO4J_FRONTEND_MAC}
    ports:
      - "${AI_STACK_NEO4J_HTTP_PORT}:7474"
      - "${AI_STACK_NEO4J_BOLT_PORT}:7687"
    environment:
      NEO4J_AUTH: neo4j/${AI_STACK_NEO4J_PASSWORD}
    volumes:
      - /mnt/user/appdata/ai-stack/neo4j/data:/data
      - /mnt/user/appdata/ai-stack/neo4j/logs:/logs
      - /mnt/user/appdata/ai-stack/neo4j/plugins:/plugins

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-stack-qdrant
    restart: unless-stopped
    networks:
      backend:
    ports:
      - "${AI_STACK_QDRANT_PORT}:6333"
    volumes:
      - /mnt/user/appdata/ai-stack/qdrant:/qdrant/storage

  supabase:
    image: supabase/supabase-all-in-one:latest
    container_name: ai-stack-supabase
    restart: unless-stopped
    networks:
      backend:
    ports:
      - "${AI_STACK_SUPABASE_STUDIO_PORT}:54323"
    environment:
      SUPABASE_URL: http://supabase:8000
      SUPABASE_ANON_KEY: ${AI_STACK_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${AI_STACK_SUPABASE_SERVICE_ROLE_KEY}
      POSTGRES_PASSWORD: ${AI_STACK_SUPABASE_POSTGRES_PASSWORD}
      JWT_SECRET: ${AI_STACK_SUPABASE_JWT_SECRET}
    volumes:
      - /mnt/user/appdata/ai-stack/supabase:/supabase

  classic-rag-api:
    build: ./classic_rag_api
    container_name: ai-stack-classic-rag-api
    restart: unless-stopped
    networks:
      backend:
    ports:
      - "8010:8000"
    environment:
      SUPABASE_URL: http://supabase:8000
      SUPABASE_SERVICE_ROLE_KEY: ${AI_STACK_SUPABASE_SERVICE_ROLE_KEY}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: documents
      LLM_API_BASE: http://localai:8080/v1

  graphrag-api:
    build: ./graphrag_api
    container_name: ai-stack-graphrag-api
    restart: unless-stopped
    networks:
      backend:
    ports:
      - "8011:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${AI_STACK_NEO4J_PASSWORD}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: graph_nodes
      LLM_API_BASE: http://localai:8080/v1

networks:
  backend:
    external: true
  frontend:
    external: true
